# ========== 中文及 CJK 字符字体 ==========
# 中文汉字主区
symbol_map U+4E00-U+9FFF LXGW WenKai Mono

# # 中文扩展区（CJK Ext A/B/C/D/E/F/G/H...）
# symbol_map U+3400-U+4DBF LXGW WenKai Mono # CJK Ext A
# symbol_map U+20000-U+2A6DF LXGW WenKai Mono # CJK Ext B
# symbol_map U+2A700-U+2B73F LXGW WenKai Mono # CJK Ext C
# symbol_map U+2B740-U+2B81F LXGW WenKai Mono # CJK Ext D
# symbol_map U+2B820-U+2CEAF LXGW WenKai Mono # CJK Ext E
# symbol_map U+2CEB0-U+2EBEF LXGW WenKai Mono # CJK Ext F
# symbol_map U+30000-U+3134F LXGW WenKai Mono # CJK Ext G
# symbol_map U+31350-U+323AF LXGW WenKai Mono # CJK Ext H

# 常用中文标点符号
# symbol_map U+3000-U+303F Noto Sans Mono CJK SC # CJK Symbols and Punctuation
# symbol_map U+FF00-U+FFEF Noto Sans Mono CJK SC # Fullwidth/halfwidth forms
#
# # 日文假名
# symbol_map U+3040-U+309F LXGW WenKai Mono # 平假名 (Hiragana)
# symbol_map U+30A0-U+30FF LXGW WenKai Mono # 片假名 (Katakana)
#
# # 韩文字符
# symbol_map U+AC00-U+D7AF LXGW WenKai Mono # Hangul Syllables
# symbol_map U+1100-U+11FF LXGW WenKai Mono # Hangul Jamo
# symbol_map U+3130-U+318F LXGW WenKai Mono # Hangul Compatibility Jamo
# symbol_map U+A960-U+A97F LXGW WenKai Mono # Hangul Jamo Extended-A
# symbol_map U+D7B0-U+D7FF LXGW WenKai Mono # Hangul Jamo Extended-B
